name: Bump Version on Master

on:
  push:
    branches:
      - master

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Determine next version
        id: tag
        run: |
          # Get latest semver tag (format: vX.Y.Z)
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v4.2.1"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Check commits since last tag for bump type
          COMMITS=$(git log "${LATEST}..HEAD" --oneline)
          echo "Commits since ${LATEST}:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Update version.php
        id: version
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          RELEASE="${NEW_TAG#v}"  # Strip v prefix: e.g. 4.3.1 (not v4.3.1)
          BUILD="$(date +%Y%m%d)01"

          echo "Nuevo tag: $NEW_TAG"
          echo "Release: $RELEASE"
          echo "Build: $BUILD"

          # Actualizar $plugin->version
          sed -i "s/\$plugin->version = [0-9]\+;/\$plugin->version = $BUILD;/" version.php
          # Actualizar $plugin->release (sin prefijo v)
          sed -i "s/\$plugin->release = '[^']*';/\$plugin->release = '$RELEASE';/" version.php

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

          echo "version.php actualizado:"
          grep -E "version|release" version.php

      - name: Commit updated version.php
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.php
          if git diff --staged --quiet; then
            echo "No changes to version.php — skipping commit and release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_tag }} (build ${{ steps.version.outputs.build }}) [skip ci]"
            git push
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.commit.outputs.skipped == 'false'
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Trigger release workflow
        if: steps.commit.outputs.skipped == 'false'
        run: |
          gh workflow run release.yml --ref ${{ steps.version.outputs.new_tag }} \
            --field tag=${{ steps.version.outputs.new_tag }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
