name: Bump Version on Master

on:
  push:
    branches:
      - master

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Determine next version
        id: tag
        run: |
          # Get latest semver tag (format: vX.Y.Z)
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v4.2.1"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Check commits since last tag for bump type
          COMMITS=$(git log "${LATEST}..HEAD" --oneline)
          echo "Commits since ${LATEST}:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Update version.php
        id: version
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          RELEASE="${NEW_TAG#v}"  # Strip v prefix: e.g. 4.3.1 (not v4.3.1)

          # Build number: YYYYMMDDNN — increment NN if already bumped today
          TODAY="$(date +%Y%m%d)"
          CURRENT_BUILD=$(grep -oP '(?<=\$plugin->version = )\d+' version.php)
          CURRENT_DATE="${CURRENT_BUILD:0:8}"
          CURRENT_NN="${CURRENT_BUILD:8:2}"
          if [ "$CURRENT_DATE" = "$TODAY" ]; then
            NN=$(printf "%02d" $((10#$CURRENT_NN + 1)))
          else
            NN="01"
          fi
          BUILD="${TODAY}${NN}"

          echo "Nuevo tag: $NEW_TAG"
          echo "Release: $RELEASE"
          echo "Build: $BUILD"

          # Actualizar $plugin->version
          sed -i "s/\$plugin->version = [0-9]\+;/\$plugin->version = $BUILD;/" version.php
          # Actualizar $plugin->release (sin prefijo v)
          sed -i "s/\$plugin->release = '[^']*';/\$plugin->release = '$RELEASE';/" version.php

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

          echo "version.php actualizado:"
          grep -E "version|release" version.php

      - name: Update CHANGES.md
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            if echo "$MSG" | grep -qE '^\[skip ci\]|^chore: bump version'; then
              continue
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?!?:'; then
              CLEAN=$(echo "$MSG" | sed 's/^feat([^)]*): //;s/^feat: //')
              ADDED="$ADDED\n * $CLEAN"
            elif echo "$MSG" | grep -qE '^fix(\([^)]+\))?:'; then
              CLEAN=$(echo "$MSG" | sed 's/^fix([^)]*): //;s/^fix: //')
              FIXED="$FIXED\n * $CLEAN"
            else
              CLEAN=$(echo "$MSG" | sed 's/^[a-z]*([^)]*): //;s/^[a-z]*: //')
              CHANGED="$CHANGED\n * $CLEAN"
            fi
          done < <(git log "${LATEST}..HEAD" --oneline)

          ENTRY="## ${NEW_TAG}\n"
          if [ -n "$ADDED" ]; then
            ENTRY="${ENTRY}# Added\n${ADDED}\n"
          fi
          if [ -n "$FIXED" ]; then
            ENTRY="${ENTRY}# Fixed\n${FIXED}\n"
          fi
          if [ -n "$CHANGED" ]; then
            ENTRY="${ENTRY}# Changed\n${CHANGED}\n"
          fi
          ENTRY="${ENTRY}\n---\n"

          TMPFILE=$(mktemp)
          echo -e "# Changelog\n${ENTRY}" > "$TMPFILE"
          tail -n +2 CHANGES.md >> "$TMPFILE"
          mv "$TMPFILE" CHANGES.md

      - name: Commit updated version.php
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.php CHANGES.md
          if git diff --staged --quiet; then
            echo "No changes to version.php — skipping commit and release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_tag }} (build ${{ steps.version.outputs.build }}) [skip ci]"
            git push
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.commit.outputs.skipped == 'false'
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Trigger release workflow
        if: steps.commit.outputs.skipped == 'false'
        run: |
          gh workflow run release.yml --ref ${{ steps.version.outputs.new_tag }} \
            --field tag=${{ steps.version.outputs.new_tag }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
