name: Mark and close stale issues

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          exempt-issue-labels: 'maintenance,enhancement,bug'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please leave a
            comment or update it. Thank you!
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you believe
            it is still relevant, feel free to reopen it or create a new one with
            updated information. Thank you!
          close-issue-reason: not_planned
