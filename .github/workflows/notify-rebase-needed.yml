name: Notify branches needing rebase

on:
  push:
    branches:
      - master

jobs:
  check-branches:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find branches behind master
        id: behind
        run: |
          git fetch --all --prune

          BRANCHES=""
          for branch in $(git branch -r | grep -v 'HEAD' | grep -v 'origin/master' | grep -v 'origin/dev' | sed 's|origin/||'); do
            COMMITS_BEHIND=$(git rev-list --count origin/$branch..origin/master 2>/dev/null || echo 0)
            if [ "$COMMITS_BEHIND" -gt 0 ]; then
              BRANCHES="$BRANCHES\n- \`$branch\` ($COMMITS_BEHIND commit(s) behind)"
            fi
          done

          if [ -z "$BRANCHES" ]; then
            echo "has_branches=false" >> $GITHUB_OUTPUT
          else
            echo "has_branches=true" >> $GITHUB_OUTPUT
            echo "branches<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BRANCHES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Get latest commit message
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s origin/master)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Update or create single tracking issue
        uses: actions/github-script@v7
        env:
          BRANCHES: ${{ steps.behind.outputs.branches }}
          HAS_BRANCHES: ${{ steps.behind.outputs.has_branches }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
        with:
          script: |
            const hasBranches = process.env.HAS_BRANCHES === 'true';
            const label = 'maintenance';
            const title = 'Ramas desactualizadas tras push a master';

            // Find existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const existing = issues.data.find(i => i.title === title);

            if (!hasBranches) {
              // No branches behind — close issue if it exists
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                });
                console.log(`Closed issue #${existing.number} — no branches behind master.`);
              } else {
                console.log('No branches behind master. Nothing to do.');
              }
              return;
            }

            const branches = process.env.BRANCHES;
            const commitMsg = process.env.COMMIT_MSG;

            const body = `## Ramas que necesitan rebase

Se ha actualizado \`master\` con: _${commitMsg}_

Las siguientes ramas están desactualizadas:

${branches}

### Para actualizar cada rama:
\`\`\`bash
git checkout <nombre-rama>
git rebase master
git push --force-with-lease
\`\`\`

_Cierra esta issue cuando hayas actualizado todas las ramas._`;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: title,
                body: body,
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
              console.log(`Created issue #${created.data.number}`);
            }
