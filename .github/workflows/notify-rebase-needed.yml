name: Notify branches needing rebase

on:
  push:
    branches:
      - master

jobs:
  check-branches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to compare branches

      - name: Find branches behind master
        id: behind
        run: |
          git fetch --all --prune

          BRANCHES=""
          for branch in $(git branch -r | grep -v 'HEAD' | grep -v 'origin/master' | grep -v 'origin/dev' | sed 's|origin/||'); do
            COMMITS_BEHIND=$(git rev-list --count origin/$branch..origin/master 2>/dev/null || echo 0)
            if [ "$COMMITS_BEHIND" -gt 0 ]; then
              BRANCHES="$BRANCHES\n- \`$branch\` ($COMMITS_BEHIND commit(s) behind)"
            fi
          done

          if [ -z "$BRANCHES" ]; then
            echo "has_branches=false" >> $GITHUB_OUTPUT
          else
            echo "has_branches=true" >> $GITHUB_OUTPUT
            # Escape newlines for multiline output
            echo "branches<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BRANCHES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Get latest commit message
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s origin/master)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Create issue if branches are behind
        if: steps.behind.outputs.has_branches == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branches = "${{ steps.behind.outputs.branches }}";
            const commitMsg = "${{ steps.commit.outputs.message }}";

            const body = `## Ramas que necesitan rebase

            Se ha actualizado \`master\` con: _${commitMsg}_

            Las siguientes ramas están desactualizadas:

            ${branches}

            ### Para actualizar cada rama:
            \`\`\`bash
            git checkout <nombre-rama>
            git rebase master
            git push --force-with-lease
            \`\`\`

            _Cierra esta issue cuando hayas actualizado todas las ramas._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Ramas desactualizadas tras push a master`,
              body: body,
              labels: ['maintenance']
            });
