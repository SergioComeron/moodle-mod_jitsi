name: CI — Code Style & PHPUnit Tests

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  codestyle:
    name: Moodle Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install moodle-cs (Moodle coding standard)
        run: composer install --no-interaction --prefer-dist

      - name: Show moodle-cs version
        run: composer show moodlehq/moodle-cs

      - name: Run PHP_CodeSniffer
        run: |
          vendor/bin/phpcs \
            --standard=moodle \
            --extensions=php \
            --ignore=api/vendor,vendor \
            --warning-severity=0 \
            .

  phpunit:
    name: PHPUnit Tests (${{ matrix.moodle-branch }}, ${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: codestyle

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_405_STABLE
          - MOODLE_501_STABLE
          - MOODLE_502_STABLE
        db:
          - pgsql
          - mysqli

    steps:
      - name: Checkout mod_jitsi
        uses: actions/checkout@v5
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, mysqli, zip, gd, curl, xml, mbstring, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin; pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin; pwd)" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "$GITHUB_ENV"

      - name: Install Moodle + plugin
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.db }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHPUnit
        run: moodle-plugin-ci phpunit

  behat:
    name: Behat Tests (${{ matrix.moodle-branch }})
    runs-on: ubuntu-latest
    needs: codestyle

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_405_STABLE
          - MOODLE_501_STABLE
          - MOODLE_502_STABLE

    steps:
      - name: Checkout mod_jitsi
        uses: actions/checkout@v5
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, zip, gd, curl, xml, mbstring, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin; pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin; pwd)" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "$GITHUB_ENV"

      - name: Install Moodle + plugin
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: pgsql
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Behat features
        run: moodle-plugin-ci behat --profile chrome
