name: CI — Code Style & PHPUnit Tests

on:
  push:
    branches:
      - master

jobs:
  codestyle:
    name: Moodle Code Style
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install moodle-cs (Moodle coding standard)
        run: composer install --no-interaction --prefer-dist

      - name: Show moodle-cs version
        run: composer show moodlehq/moodle-cs

      - name: Run PHP_CodeSniffer
        run: |
          vendor/bin/phpcs \
            --standard=moodle \
            --extensions=php \
            --ignore=api/vendor,vendor \
            --warning-severity=0 \
            .

  phpunit:
    name: PHPUnit Tests (${{ matrix.moodle-branch }}, ${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: codestyle
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_405_STABLE
          - MOODLE_500_STABLE
          - MOODLE_501_STABLE
        db:
          - pgsql
          - mysqli

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: moodle
          MYSQL_DATABASE: moodle
          MYSQL_USER: moodle
          MYSQL_PASSWORD: moodle
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Checkout mod_jitsi
        uses: actions/checkout@v4
        with:
          path: mod_jitsi

      - name: Checkout Moodle
        uses: actions/checkout@v4
        with:
          repository: moodle/moodle
          ref: ${{ matrix.moodle-branch }}
          path: moodle

      - name: Place plugin inside Moodle
        run: mv mod_jitsi moodle/mod/jitsi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, mysqli, zip, curl, xml, mbstring, intl

      - name: Install Moodle composer dependencies
        run: |
          cd moodle
          composer install --no-interaction --prefer-dist

      - name: Create Moodle data directories
        run: |
          mkdir -p /tmp/moodledata
          mkdir -p /tmp/moodledata_phpunit
          chmod 777 /tmp/moodledata /tmp/moodledata_phpunit

      - name: Create Moodle config.php
        run: |
          php -r "
          \$db = '${{ matrix.db }}';
          \$isMySQL = \$db === 'mysqli';
          \$config = '<?php' . PHP_EOL;
          \$config .= 'unset(\$CFG);' . PHP_EOL;
          \$config .= 'global \$CFG;' . PHP_EOL;
          \$config .= '\$CFG = new stdClass();' . PHP_EOL;
          \$config .= '\$CFG->dbtype    = \"' . \$db . '\";' . PHP_EOL;
          \$config .= '\$CFG->dblibrary = \"native\";' . PHP_EOL;
          \$config .= '\$CFG->dbhost    = \"127.0.0.1\";' . PHP_EOL;
          \$config .= '\$CFG->dbname    = \"moodle\";' . PHP_EOL;
          \$config .= '\$CFG->dbuser    = \"moodle\";' . PHP_EOL;
          \$config .= '\$CFG->dbpass    = \"moodle\";' . PHP_EOL;
          \$config .= '\$CFG->prefix    = \"mdl_\";' . PHP_EOL;
          \$config .= '\$CFG->dboptions = array(\"dbport\" => ' . (\$isMySQL ? '3306' : '5432') . ');' . PHP_EOL;
          \$config .= '\$CFG->wwwroot   = \"http://localhost\";' . PHP_EOL;
          \$config .= '\$CFG->dataroot  = \"/tmp/moodledata\";' . PHP_EOL;
          \$config .= '\$CFG->admin     = \"admin\";' . PHP_EOL;
          \$config .= '\$CFG->directorypermissions = 0777;' . PHP_EOL;
          \$config .= '\$CFG->phpunit_prefix   = \"phpu_\";' . PHP_EOL;
          \$config .= '\$CFG->phpunit_dataroot = \"/tmp/moodledata_phpunit\";' . PHP_EOL;
          \$config .= 'require_once(__DIR__ . \"/lib/setup.php\");' . PHP_EOL;
          file_put_contents('moodle/config.php', \$config);
          echo 'config.php created for ' . \$db . PHP_EOL;
          "

      - name: Configure Moodle for testing
        run: |
          cd moodle
          php admin/tool/phpunit/cli/init.php
        env:
          MOODLE_PHPUNIT_DATAROOT: /tmp/moodledata_phpunit
          MOODLE_PHPUNIT_WWWROOT: http://localhost

      - name: Run mod_jitsi tests
        run: |
          cd moodle
          vendor/bin/phpunit --testsuite mod_jitsi_testsuite --testdox
        env:
          MOODLE_PHPUNIT_DATAROOT: /tmp/moodledata_phpunit
          MOODLE_PHPUNIT_WWWROOT: http://localhost
