name: CI — Code Style & PHPUnit Tests

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

jobs:
  codestyle:
    name: Moodle Code Style
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install moodle-cs (Moodle coding standard)
        run: composer install --no-interaction --prefer-dist

      - name: Show moodle-cs version
        run: composer show moodlehq/moodle-cs

      - name: Run PHP_CodeSniffer
        run: |
          vendor/bin/phpcs \
            --standard=moodle \
            --extensions=php \
            --ignore=api/vendor,vendor \
            --warning-severity=0 \
            .

  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: codestyle
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout mod_jitsi
        uses: actions/checkout@v4
        with:
          path: mod_jitsi

      - name: Checkout Moodle
        uses: actions/checkout@v4
        with:
          repository: moodle/moodle
          ref: MOODLE_405_STABLE
          path: moodle

      - name: Place plugin inside Moodle
        run: mv mod_jitsi moodle/mod/jitsi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, zip, curl, xml, mbstring, intl

      - name: Install Moodle composer dependencies
        run: |
          cd moodle
          composer install --no-interaction --prefer-dist

      - name: Create Moodle config.php
        run: |
          cat > moodle/config.php << 'EOF'
          <?php
          unset($CFG);
          global $CFG;
          $CFG = new stdClass();
          $CFG->dbtype    = 'pgsql';
          $CFG->dblibrary = 'native';
          $CFG->dbhost    = 'localhost';
          $CFG->dbname    = 'moodle';
          $CFG->dbuser    = 'moodle';
          $CFG->dbpass    = 'moodle';
          $CFG->prefix    = 'mdl_';
          $CFG->dboptions = array('dbport' => 5432);
          $CFG->wwwroot   = 'http://localhost';
          $CFG->dataroot  = '/tmp/moodledata';
          $CFG->admin     = 'admin';
          $CFG->directorypermissions = 0777;
          $CFG->phpunit_prefix   = 'phpu_';
          $CFG->phpunit_dataroot = '/tmp/moodledata_phpunit';
          require_once(__DIR__ . '/lib/setup.php');
          EOF

      - name: Configure Moodle for testing
        run: |
          cd moodle
          php admin/tool/phpunit/cli/init.php
        env:
          MOODLE_PHPUNIT_DATAROOT: /tmp/moodledata_phpunit
          MOODLE_PHPUNIT_WWWROOT: http://localhost

      - name: Run mod_jitsi tests
        run: |
          cd moodle
          vendor/bin/phpunit --testsuite mod_jitsi_testsuite --testdox
        env:
          MOODLE_PHPUNIT_DATAROOT: /tmp/moodledata_phpunit
          MOODLE_PHPUNIT_WWWROOT: http://localhost
